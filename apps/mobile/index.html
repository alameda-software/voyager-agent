<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0b1220" />
  <title>VoyagerAgent</title>
  <style>
    * { box-sizing: border-box; }
    html {
      height: 100%;
      width: 100%;
      max-width: 100vw;
      background: #ffffff;
      overflow: hidden;
    }
    body {
      height: 100%;
      width: 100%;
      max-width: 100vw;
      margin: 0;
      padding: 0;
      background: #ffffff;
      overflow-x: hidden;
      overflow-y: hidden;
      overscroll-behavior: none;
    }
    #root {
      height: 100%;
      width: 100%;
      max-width: 100vw;
      overflow: hidden;
      background: #ffffff;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }
    #root {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: -webkit-fill-available;
    }
    /* Force full height on mobile Safari */
    @supports (-webkit-touch-callout: none) {
      html, body, #root {
        height: -webkit-fill-available;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
