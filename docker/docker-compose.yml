services:
  api:
    build: ../services/api
    ports:
      - "8000:8000"
    env_file:
      - ../services/api/.env
    depends_on:
      - postgres
      - redis
    volumes:
      - ../services/api:/app

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: voyager
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
