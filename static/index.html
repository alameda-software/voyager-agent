<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0f0f23"/>
<title>VoyagerAgent</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f23;color:#fff}
#app{max-width:480px;margin:0 auto;height:100vh;display:flex;flex-direction:column;position:relative}

/* Header */
.header{padding:60px 16px 12px;background:#1a1a2e;border-bottom:1px solid #2a2a4a;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header h1{font-size:28px;font-weight:700}
.header-btn{background:none;border:none;color:#6c63ff;cursor:pointer;padding:4px}
.header-btn svg{width:24px;height:24px}

/* Chat list */
.chat-list{flex:1;overflow-y:auto;padding:0 16px}
.chat-item{display:flex;align-items:center;padding:16px 0;border-bottom:1px solid #1a1a2e;cursor:pointer;transition:background .15s}
.chat-item:hover{background:#1a1a2e30;border-radius:8px}
.chat-item:active{background:#1a1a2e50}
.chat-emoji{font-size:28px;margin-right:14px;flex-shrink:0}
.chat-info{flex:1;min-width:0}
.chat-title{font-size:16px;font-weight:600}
.chat-preview{font-size:14px;color:#888;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-time{font-size:12px;color:#666;flex-shrink:0;margin-left:12px}
.empty-state{text-align:center;margin-top:80px;color:#555}
.empty-state p{margin:8px 0}

/* Chat screen */
.chat-screen{display:none;flex-direction:column;height:100vh;max-height:100vh}
.chat-screen.active{display:flex}
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}

/* Message bubbles */
.msg-row{display:flex;margin-bottom:2px}
.msg-row.user{justify-content:flex-end}
.msg-row.agent{justify-content:flex-start}
.msg-bubble{max-width:85%;padding:12px 16px;border-radius:16px;font-size:15px;line-height:1.4;word-break:break-word}
.msg-bubble.user{background:#6c63ff;color:#fff;border-bottom-right-radius:4px}
.msg-bubble.agent{background:#1a1a2e;color:#e0e0e0;border-bottom-left-radius:4px}

/* Flight card */
.flight-card{background:#252545;border:1px solid #333366;border-radius:12px;padding:14px;margin:10px 0}
.flight-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.flight-airline{font-size:15px;font-weight:600}
.flight-price{background:#6c63ff20;padding:4px 10px;border-radius:8px;color:#6c63ff;font-size:14px;font-weight:700}
.flight-route{display:flex;align-items:center;margin-bottom:10px}
.route-point{flex:1;text-align:center}
.route-time{font-size:18px;font-weight:700}
.route-airport{font-size:12px;color:#888;margin-top:2px}
.route-line{flex:1;display:flex;align-items:center;padding:0 8px}
.route-line .line{flex:1;height:1px;background:#6c63ff40}
.route-line svg{color:#6c63ff}
.flight-footer{display:flex;justify-content:space-around;padding:8px 0;border-top:1px solid #333366;font-size:12px;color:#888}
.book-btn{background:#6c63ff;border:none;color:#fff;font-size:14px;font-weight:600;padding:10px;border-radius:8px;width:100%;margin-top:10px;cursor:pointer}
.book-btn:hover{background:#5b52ee}

/* Input */
.input-bar{display:flex;align-items:center;padding:8px 12px;background:#1a1a2e;border-top:1px solid #2a2a4a;flex-shrink:0}
.input-bar input{flex:1;background:#252545;border:none;border-radius:20px;padding:10px 16px;color:#fff;font-size:15px;outline:none}
.input-bar input::placeholder{color:#555}
.send-btn{width:40px;height:40px;border-radius:20px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-left:8px}
.send-btn svg{color:#6c63ff}

/* Tab bar */
.tab-bar{display:flex;background:#1a1a2e;border-top:1px solid #2a2a4a;padding:8px 0;padding-bottom:max(8px,env(safe-area-inset-bottom));flex-shrink:0}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px;color:#888;font-size:11px;border:none;background:none}
.tab-item.active{color:#6c63ff}
.tab-item svg{width:24px;height:24px}

/* Transition */
.fade-in{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="app">
  <!-- Chat List View -->
  <div id="chatList" style="display:flex;flex-direction:column;height:100vh">
    <div class="header">
      <h1>Chats</h1>
      <button class="header-btn" onclick="newChat()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <div class="chat-list" id="conversationList"></div>
    <div class="tab-bar">
      <button class="tab-item active" onclick="showTab('chats')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>Chats</span>
      </button>
      <button class="tab-item" onclick="showTab('search')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>Search</span>
      </button>
      <button class="tab-item" onclick="showTab('profile')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profile</span>
      </button>
    </div>
  </div>

  <!-- Chat Screen -->
  <div id="chatScreen" class="chat-screen">
    <div class="header">
      <button class="header-btn" onclick="backToList()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <h1 style="font-size:18px" id="chatTitle">VoyagerAgent</h1>
      <div style="width:24px"></div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-bar">
      <input type="text" id="msgInput" placeholder="Search flights, hotels..." onkeydown="if(event.key==='Enter')sendMsg()"/>
      <button class="send-btn" onclick="sendMsg()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
// Data
let conversations = [
  {id:'1',title:'Trip to London',preview:'Found 3 flights for next weekend...',time:'10:30',emoji:'️'}
];
let currentConv = null;
const messages = {
  '1': [
    {role:'agent',type:'text',content:'Hey! Where are you heading? I can search flights for you. ✈️'},
    {role:'user',type:'text',content:'Find me a flight from SVQ to LHR next Friday'},
    {role:'agent',type:'flights',content:'Here are some options for Seville → London:',data:[
      {id:'f1',airline:'Ryanair',departure:'SVQ',arrival:'STN',depTime:'06:30',arrTime:'08:45',duration:'2h 15m',stops:0,price:49,currency:'€',cabin:'Economy'},
      {id:'f2',airline:'Vueling',departure:'SVQ',arrival:'LGW',depTime:'10:15',arrTime:'12:30',duration:'2h 15m',stops:0,price:78,currency:'€',cabin:'Economy'},
      {id:'f3',airline:'British Airways',departure:'SVQ',arrival:'LHR',depTime:'14:20',arrTime:'17:50',duration:'3h 30m',stops:1,price:142,currency:'€',cabin:'Economy'}
    ]}
  ]
};

function renderConversations(){
  const el=document.getElementById('conversationList');
  if(!conversations.length){
    el.innerHTML='<div class="empty-state"><p style="font-size:18px">No conversations yet</p><p style="font-size:14px">Tap + to start searching</p></div>';
    return;
  }
  el.innerHTML=conversations.map(c=>`
    <div class="chat-item" onclick="openChat('${c.id}','${c.title}')">
      <span class="chat-emoji">${c.emoji}</span>
      <div class="chat-info">
        <div class="chat-title">${c.title}</div>
        <div class="chat-preview">${c.preview}</div>
      </div>
      <span class="chat-time">${c.time}</span>
    </div>
  `).join('');
}

function openChat(id,title){
  currentConv=id;
  document.getElementById('chatTitle').textContent=title;
  document.getElementById('chatList').style.display='none';
  document.getElementById('chatScreen').classList.add('active');
  renderMessages();
}

function backToList(){
  document.getElementById('chatList').style.display='flex';
  document.getElementById('chatScreen').classList.remove('active');
  currentConv=null;
}

function newChat(){
  const id=Date.now().toString();
  conversations.unshift({id,title:'New search',preview:'Where are you heading?',time:'Now',emoji:'🌍'});
  messages[id]=[{role:'agent',type:'text',content:'Hey! Where are you heading? ✈️'}];
  renderConversations();
  openChat(id,'New search');
}

function renderMessages(){
  const el=document.getElementById('messages');
  const msgs=messages[currentConv]||[];
  el.innerHTML=msgs.map(m=>{
    if(m.type==='flights'&&m.data){
      const cards=m.data.map(f=>flightCard(f)).join('');
      return `<div class="msg-row agent fade-in"><div class="msg-bubble agent">${m.content}${cards}</div></div>`;
    }
    return `<div class="msg-row ${m.role} fade-in"><div class="msg-bubble ${m.role}">${m.content}</div></div>`;
  }).join('');
  el.scrollTop=el.scrollHeight;
}

function flightCard(f){
  return `
    <div class="flight-card">
      <div class="flight-header">
        <span class="flight-airline">${f.airline}</span>
        <span class="flight-price">${f.price} ${f.currency}</span>
      </div>
      <div class="flight-route">
        <div class="route-point">
          <div class="route-time">${f.depTime}</div>
          <div class="route-airport">${f.departure}</div>
        </div>
        <div class="route-line">
          <div class="line"></div>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="#6c63ff"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>
          <div class="line"></div>
        </div>
        <div class="route-point">
          <div class="route-time">${f.arrTime}</div>
          <div class="route-airport">${f.arrival}</div>
        </div>
      </div>
      <div class="flight-footer">
        <span>${f.duration}</span>
        <span>${f.stops===0?'Direct':f.stops+' stop'+(f.stops>1?'s':'')}</span>
        <span>${f.cabin}</span>
      </div>
      <button class="book-btn">Book</button>
    </div>`;
}

const API_URL = window.location.protocol + '//' + window.location.host.replace(':8082', ':8000');

async function sendMsg(){
  const input=document.getElementById('msgInput');
  const text=input.value.trim();
  if(!text||!currentConv)return;
  messages[currentConv].push({role:'user',type:'text',content:text});
  input.value='';
  renderMessages();

  // Call backend agent
  try {
    const resp = await fetch(API_URL + '/api/v1/chat/send', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text, conversation_id: parseInt(currentConv)})
    });
    const data = await resp.json();
    messages[currentConv].push({role: data.role, type: 'text', content: data.content});
    renderMessages();
  } catch(e) {
    messages[currentConv].push({role:'agent',type:'text',content:'⚠️ Backend not connected. Make sure the API is running.'});
    renderMessages();
  }
}

function showTab(tab){
  document.querySelectorAll('.tab-item').forEach((t,i)=>{
    t.classList.toggle('active',
      (tab==='chats'&&i===0)||(tab==='search'&&i===1)||(tab==='profile'&&i===2));
  });
  if(tab!=='chats'){
    document.getElementById('chatList').style.display='none';
    document.getElementById('chatScreen').classList.add('active');
    document.getElementById('chatTitle').textContent=tab.charAt(0).toUpperCase()+tab.slice(1);
    const el=document.getElementById('messages');
    el.innerHTML=`<div class="msg-row agent"><div class="msg-bubble agent" style="text-align:center;padding:40px 20px"><p style="font-size:24px;margin-bottom:12px">${tab==='search'?'🔍':'👤'}</p><p style="font-size:16px;color:#fff;font-weight:600">${tab.charAt(0).toUpperCase()+tab.slice(1)}</p><p style="font-size:14px;color:#888;margin-top:8px">${tab==='search'?'Quick search coming soon':'Profile settings coming soon'}</p></div></div>`;
  }
}

renderConversations();
</script>
</body>
</html>
